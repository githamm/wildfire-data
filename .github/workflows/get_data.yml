name: Get wildfire API data
on:
  push:
  workflow_dispatch:
    inputs:
      run_backfill:
        description: "Re-process ALL existing perimeter-history files with the current simplify/round/dedup settings (one-time; leave unchecked for normal runs)"
        type: boolean
        default: false
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

concurrency:
  group: wildfire-data-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scheduled:
    runs-on: ubuntu-latest
    steps:
      - name: Check out this repo
        uses: actions/checkout@v4

      - name: Fetch map data
        run: |-
          set -euo pipefail

          # IncidentTypeCategory restricted to WF (wildfire) and CX (incident
          # complex -- multiple wildfires under one command). RX (prescribed
          # fire) is deliberately excluded so the map never shows planned burns.
          url="https://services3.arcgis.com/T4QMspbfLg3qTGWY/arcgis/rest/services/WFIGS_Incident_Locations_Current/FeatureServer/0/query?where=IncidentTypeCategory%20IN%20('WF','CX')&outFields=FireCause,FireDiscoveryDateTime,IncidentName,IncidentTypeCategory,PercentContained,POOCounty,POOLandownerCategory,POOState,TotalIncidentPersonnel,IncidentSize,ModifiedOnDateTime_dt,IncidentComplexityLevel,POOCity&outSR=4326&f=geojson"

          success=false
          for attempt in 1 2 3 4 5 6; do
            # -w writes the HTTP status code after the body so we can inspect it
            # even on a "successful" curl exit (no --fail, so 429/5xx don't hard-fail curl here)
            http_code=$(curl -sS -k --retry 2 --retry-delay 5 --max-time 30 \
                 -X GET "$url" -H "accept: application/json" \
                 -o map_data.tmp.json -w "%{http_code}")

            # Esri's services sometimes return HTTP 200 with an application-
            # level error embedded in the JSON body instead (e.g. an
            # organization-wide request-unit quota), so the body has to be
            # checked even when the transport-level status looks fine.
            embedded_code=""
            if [ "$http_code" = "200" ]; then
              embedded_code=$(jq -r '.error.code // empty' map_data.tmp.json 2>/dev/null || echo "")
            fi

            if [ "$http_code" = "200" ] && [ -z "$embedded_code" ]; then
              success=true
              break
            fi

            effective_code="$http_code"
            if [ -n "$embedded_code" ]; then
              effective_code="$embedded_code"
            fi

            if [ "$effective_code" = "429" ]; then
              # Base wait grows with attempt number, plus random jitter (0-30s) so we
              # don't land in the same crowded window as other callers retrying on a clean clock
              jitter=$((RANDOM % 30))
              wait_time=$((60 + (attempt * 15) + jitter))
              echo "Attempt $attempt: rate limited (429${embedded_code:+, embedded in a 200 response}). Waiting ${wait_time}s before retry..."
              sleep "$wait_time"
            else
              echo "Attempt $attempt: HTTP $http_code${embedded_code:+ (embedded error code $embedded_code)}. Retrying in 15s..."
              sleep 15
            fi
          done

          if [ "$success" != "true" ]; then
            echo "::error::Failed to fetch map data after 6 attempts (last HTTP code: $http_code${embedded_code:+, embedded error code: $embedded_code})"
            cat map_data.tmp.json || true
            exit 1
          fi

          # Validate it's a real GeoJSON FeatureCollection, not an error payload or empty shell
          if ! jq -e '.type == "FeatureCollection" and (.features | type == "array")' map_data.tmp.json > /dev/null 2>&1; then
            echo "::error::Map data response is not a valid GeoJSON FeatureCollection. Response was:"
            cat map_data.tmp.json
            exit 1
          fi

          new_count=$(jq '.features | length' map_data.tmp.json)
          old_count=$(jq '.features | length' map_data.json 2>/dev/null || echo 0)

          echo "Previous feature count: $old_count, new feature count: $new_count"

          # Guard against a "successful" response that's suspiciously empty
          # compared to what we already had (catches silent partial failures
          # that still pass basic JSON validation)
          if [ "$old_count" -gt 0 ] && [ "$new_count" -eq 0 ]; then
            echo "::error::New map data has 0 features but previous file had $old_count. Refusing to overwrite — likely an API issue, not a real drop to zero incidents."
            exit 1
          fi

          jq '.' map_data.tmp.json > map_data.json
          rm map_data.tmp.json

      - name: Fetch table data
        run: |-
          set -euo pipefail

          url="https://services3.arcgis.com/T4QMspbfLg3qTGWY/arcgis/rest/services/WFIGS_Incident_Locations_YearToDate/FeatureServer/0/query?where=IncidentTypeCategory%20%3D%20%27WF%27%20AND%20POOState%20%3D%20%27US-CO%27&outFields=IncidentSize,FireCause,FireDiscoveryDateTime,IncidentName,IncidentTypeCategory,PercentContained,POOCounty,POOState&outSR=4326&f=geojson"

          success=false
          for attempt in 1 2 3 4 5 6; do
            http_code=$(curl -sS -k --retry 2 --retry-delay 5 --max-time 30 \
                 -X GET "$url" -H "accept: application/json" \
                 -o table_data.tmp.json -w "%{http_code}")

            embedded_code=""
            if [ "$http_code" = "200" ]; then
              embedded_code=$(jq -r '.error.code // empty' table_data.tmp.json 2>/dev/null || echo "")
            fi

            if [ "$http_code" = "200" ] && [ -z "$embedded_code" ]; then
              success=true
              break
            fi

            effective_code="$http_code"
            if [ -n "$embedded_code" ]; then
              effective_code="$embedded_code"
            fi

            if [ "$effective_code" = "429" ]; then
              jitter=$((RANDOM % 30))
              wait_time=$((60 + (attempt * 15) + jitter))
              echo "Attempt $attempt: rate limited (429${embedded_code:+, embedded in a 200 response}). Waiting ${wait_time}s before retry..."
              sleep "$wait_time"
            else
              echo "Attempt $attempt: HTTP $http_code${embedded_code:+ (embedded error code $embedded_code)}. Retrying in 15s..."
              sleep 15
            fi
          done

          if [ "$success" != "true" ]; then
            echo "::error::Failed to fetch table data after 6 attempts (last HTTP code: $http_code${embedded_code:+, embedded error code: $embedded_code})"
            cat table_data.tmp.json || true
            exit 1
          fi

          if ! jq -e '.type == "FeatureCollection" and (.features | type == "array")' table_data.tmp.json > /dev/null 2>&1; then
            echo "::error::Table data response is not a valid GeoJSON FeatureCollection. Response was:"
            cat table_data.tmp.json
            exit 1
          fi

          new_count=$(jq '.features | length' table_data.tmp.json)
          old_count=$(jq '.features | length' table_data.json 2>/dev/null || echo 0)

          echo "Previous feature count: $old_count, new feature count: $new_count"

          if [ "$old_count" -gt 0 ] && [ "$new_count" -eq 0 ]; then
            echo "::error::New table data has 0 features but previous file had $old_count. Refusing to overwrite."
            exit 1
          fi

          jq '.' table_data.tmp.json > table_data.json
          rm table_data.tmp.json

      - name: Fetch perimeter data
        run: |-
          set -euo pipefail

          # Colorado only, WF only (NIFC's perimeter service includes RX
          # prescribed-burn perimeters by default, so that's excluded here
          # the same way it's excluded from map data above). Not every fire
          # has a mapped perimeter, so a small/zero feature count here is
          # normal and doesn't necessarily mean the fetch failed.
          url="https://services3.arcgis.com/T4QMspbfLg3qTGWY/arcgis/rest/services/WFIGS_Interagency_Perimeters_Current/FeatureServer/0/query?where=attr_POOState%3D%27US-CO%27%20AND%20attr_IncidentTypeCategory%3D%27WF%27&outFields=attr_IncidentName,poly_IncidentName,attr_FireCause,attr_IncidentTypeCategory,attr_UniqueFireIdentifier,poly_GISAcres,attr_IncidentSize,attr_PercentContained,attr_TotalIncidentPersonnel,attr_IncidentComplexityLevel,attr_POOCity,attr_POOLandownerCategory,attr_POOCounty,attr_FireDiscoveryDateTime,attr_ModifiedOnDateTime_dt,poly_DateCurrent&outSR=4326&f=geojson"

          success=false
          for attempt in 1 2 3 4 5 6; do
            http_code=$(curl -sS -k --retry 2 --retry-delay 5 --max-time 30 \
                 -X GET "$url" -H "accept: application/json" \
                 -o perimeter_data.tmp.json -w "%{http_code}")

            embedded_code=""
            if [ "$http_code" = "200" ]; then
              embedded_code=$(jq -r '.error.code // empty' perimeter_data.tmp.json 2>/dev/null || echo "")
            fi

            if [ "$http_code" = "200" ] && [ -z "$embedded_code" ]; then
              success=true
              break
            fi

            effective_code="$http_code"
            if [ -n "$embedded_code" ]; then
              effective_code="$embedded_code"
            fi

            if [ "$effective_code" = "429" ]; then
              jitter=$((RANDOM % 30))
              wait_time=$((60 + (attempt * 15) + jitter))
              echo "Attempt $attempt: rate limited (429${embedded_code:+, embedded in a 200 response}). Waiting ${wait_time}s before retry..."
              sleep "$wait_time"
            else
              echo "Attempt $attempt: HTTP $http_code${embedded_code:+ (embedded error code $embedded_code)}. Retrying in 15s..."
              sleep 15
            fi
          done

          if [ "$success" != "true" ]; then
            echo "::error::Failed to fetch perimeter data after 6 attempts (last HTTP code: $http_code${embedded_code:+, embedded error code: $embedded_code})"
            cat perimeter_data.tmp.json || true
            exit 1
          fi

          if ! jq -e '.type == "FeatureCollection" and (.features | type == "array")' perimeter_data.tmp.json > /dev/null 2>&1; then
            echo "::error::Perimeter data response is not a valid GeoJSON FeatureCollection. Response was:"
            cat perimeter_data.tmp.json
            exit 1
          fi

          new_count=$(jq '.features | length' perimeter_data.tmp.json)
          old_count=$(jq '.features | length' perimeter_data.json 2>/dev/null || echo 0)

          echo "Previous feature count: $old_count, new feature count: $new_count"

          if [ "$old_count" -gt 0 ] && [ "$new_count" -eq 0 ]; then
            echo "::error::New perimeter data has 0 features but previous file had $old_count. Refusing to overwrite."
            exit 1
          fi

          jq '.' perimeter_data.tmp.json > perimeter_data.json
          rm perimeter_data.tmp.json

      - name: Write shared perimeter geometry helpers
        run: |-
          set -euo pipefail
          cat > /tmp/perimeter_geometry.py << 'PYEOF'
          # Shared by both the daily archive step and the one-time backfill
          # step, so the two paths can never drift apart on tolerance/
          # precision -- a fire archived today and a fire reprocessed by the
          # backfill should end up byte-identical for the same input.
          import math

          # NIFC's source coordinates commonly carry 10+ decimal places --
          # far beyond both GPS/IR-derived mapping accuracy and anything
          # visible at this map's zoom levels (5 decimal places is ~1.1m).
          # Rounding before archiving is a large, lossless-in-practice cut
          # to perimeter-history file size with no library/dependency
          # needed. Recurses on nested coordinate arrays (Polygon,
          # MultiPolygon, etc.) down to the [lon, lat] leaves.
          COORD_PRECISION = 5

          def round_coords(coords, precision=COORD_PRECISION):
              if isinstance(coords[0], (int, float)):
                  return [round(c, precision) for c in coords]
              return [round_coords(c, precision) for c in coords]

          def round_geometry(geometry, precision=COORD_PRECISION):
              if not geometry or "coordinates" not in geometry:
                  return geometry
              geometry = dict(geometry)
              geometry["coordinates"] = round_coords(geometry["coordinates"], precision)
              return geometry

          # Vertex-count reduction, applied before rounding. Some fire
          # perimeters carry tens of thousands of points per ring -- almost
          # all of it redundant, near-collinear detail from the source
          # mapping, not meaningful shape. Douglas-Peucker drops a point
          # only if doing so would move the boundary by less than
          # SIMPLIFY_TOLERANCE_METERS from the original line -- that's a
          # hard mathematical bound on the whole ring, not an average, so
          # "is my house inside the perimeter" stays reliable at any zoom
          # level: 5m is smaller than the mapping data's own real-world
          # accuracy (perimeters are digitized from infrared flight
          # imagery, generally uncertain on the order of tens of meters),
          # so this adds negligible error on top of what's already there.
          #
          # Distance is measured in real meters, not raw lon/lat degrees --
          # Colorado sits around 39N, where a degree of longitude is
          # ~78% as long as a degree of latitude, so a flat degree
          # tolerance would let simplification distort shapes more
          # east-west than north-south. REFERENCE_LAT_DEG fixes that scale
          # factor for the whole run rather than computing it per fire;
          # the difference across Colorado's own latitude range is small
          # enough not to matter at this tolerance.
          SIMPLIFY_TOLERANCE_METERS = 5
          REFERENCE_LAT_DEG = 39.0
          METERS_PER_DEG_LAT = 111320.0
          METERS_PER_DEG_LON = 111320.0 * math.cos(math.radians(REFERENCE_LAT_DEG))

          def _to_meters(point):
              return (point[0] * METERS_PER_DEG_LON, point[1] * METERS_PER_DEG_LAT)

          def _point_segment_distance_m(point, start, end):
              px, py = _to_meters(point)
              sx, sy = _to_meters(start)
              ex, ey = _to_meters(end)
              dx, dy = ex - sx, ey - sy
              if dx == 0 and dy == 0:
                  return math.hypot(px - sx, py - sy)
              t = ((px - sx) * dx + (py - sy) * dy) / (dx * dx + dy * dy)
              t = max(0.0, min(1.0, t))
              cx, cy = sx + t * dx, sy + t * dy
              return math.hypot(px - cx, py - cy)

          def simplify_ring(points, epsilon_m):
              # Iterative Douglas-Peucker (explicit stack, not recursion) --
              # a recursive version can exceed Python's default recursion
              # depth on a ring with tens of thousands of points.
              if len(points) < 4:
                  return points

              keep = [False] * len(points)
              keep[0] = keep[-1] = True
              stack = [(0, len(points) - 1)]

              while stack:
                  start_i, end_i = stack.pop()
                  start, end = points[start_i], points[end_i]
                  max_dist = -1.0
                  max_i = -1
                  for i in range(start_i + 1, end_i):
                      d = _point_segment_distance_m(points[i], start, end)
                      if d > max_dist:
                          max_dist = d
                          max_i = i
                  if max_dist > epsilon_m:
                      keep[max_i] = True
                      stack.append((start_i, max_i))
                      stack.append((max_i, end_i))

              simplified = [p for p, k in zip(points, keep) if k]
              # A closed ring needs at least 4 points (3 distinct vertices
              # plus the repeated closing point) to stay valid GeoJSON --
              # if simplification would collapse it below that, keep the
              # original ring rather than emit something invalid.
              return simplified if len(simplified) >= 4 else points

          def simplify_geometry(geometry, epsilon_m=SIMPLIFY_TOLERANCE_METERS):
              if not geometry or "coordinates" not in geometry:
                  return geometry
              gtype = geometry.get("type")
              coords = geometry["coordinates"]
              geometry = dict(geometry)
              if gtype == "Polygon":
                  geometry["coordinates"] = [simplify_ring(ring, epsilon_m) for ring in coords]
              elif gtype == "MultiPolygon":
                  geometry["coordinates"] = [
                      [simplify_ring(ring, epsilon_m) for ring in polygon]
                      for polygon in coords
                  ]
              return geometry

          # A fire's mapped perimeter commonly goes several days without any
          # new mapping (e.g. once growth stalls but containment is still
          # being worked), during which every field EXCEPT geometry keeps
          # changing day to day -- so this still writes a full entry for
          # every calendar day (matching the Perimeters tab's "day by day"
          # framing and keeping acres/containment/personnel/etc. correct
          # for that specific day), it just avoids storing a second literal
          # copy of an unchanged polygon, which is what actually dominates
          # file size. Comparison is on the already-simplified/rounded
          # geometry (the canonical stored form), not raw upstream
          # coordinates, so two days whose mapping differs by less than the
          # simplify tolerance -- effectively noise -- also correctly dedupe.
          #
          # geometrySameAsDate always points directly at a day with literal
          # geometry (never at another reference), so consumers only need a
          # single lookup, never a chain walk. history must be chronological
          # (oldest first); mutates and returns it in place. Safe to call
          # repeatedly on the same list -- entries already deduped, or that
          # never had geometry at all, are left alone.
          def dedupe_consecutive_geometry(history):
              resolved = {}
              last_date = None
              last_geometry = None

              for entry in history:
                  date = entry["date"]
                  geom = entry.get("geometry")
                  if geom is None and entry.get("geometrySameAsDate"):
                      geom = resolved.get(entry["geometrySameAsDate"])
                  resolved[date] = geom

                  if geom is not None and geom == last_geometry:
                      entry["geometry"] = None
                      entry["geometrySameAsDate"] = last_date
                  elif geom is not None:
                      entry["geometry"] = geom
                      entry.pop("geometrySameAsDate", None)
                      last_geometry = geom
                      last_date = date
                  else:
                      entry.pop("geometrySameAsDate", None)

              return history
          PYEOF

      - name: Archive daily perimeter snapshot
        run: |-
          set -euo pipefail
          cat > /tmp/archive_perimeters.py << 'PYEOF'
          import json, os, re, sys
          from datetime import datetime
          from zoneinfo import ZoneInfo

          sys.path.insert(0, "/tmp")
          from perimeter_geometry import round_geometry, simplify_geometry, dedupe_consecutive_geometry

          # "Daily" means a Colorado calendar day to readers, not a UTC one --
          # use Mountain Time (handles MST/MDT automatically) for the date key.
          TODAY = datetime.now(ZoneInfo("America/Denver")).strftime("%Y-%m-%d")
          HISTORY_DIR = "perimeter-history"
          INDEX_PATH = "fire-index.json"

          def safe_id(raw_id):
              return re.sub(r"[^A-Za-z0-9_-]", "_", raw_id)

          def acres_from(props):
              # Prefer the mapped-perimeter acreage; fall back to reported size.
              return props.get("poly_GISAcres", props.get("attr_IncidentSize"))

          def main():
              with open("perimeter_data.json", encoding="utf-8") as f:
                  current = json.load(f)

              os.makedirs(HISTORY_DIR, exist_ok=True)

              if os.path.exists(INDEX_PATH):
                  with open(INDEX_PATH, encoding="utf-8") as f:
                      index = json.load(f)
              else:
                  index = {}

              # One-time migration: entries written before "acres" replaced
              # "peakAcres" never pick up the new field on their own once a
              # fire goes inactive, since the loop below only updates fires
              # present in this run's feed -- that's what left past fires
              # showing "size unknown" in the picker. Backfill from the old
              # field and retire it now that nothing reads it.
              for entry in index.values():
                  if "acres" not in entry and "peakAcres" in entry:
                      entry["acres"] = entry["peakAcres"]
                  entry.pop("peakAcres", None)

              seen_today = set()
              skipped_no_id = 0

              for feature in current.get("features", []):
                  props = feature.get("properties", {})
                  fire_id = props.get("attr_UniqueFireIdentifier")
                  if not fire_id:
                      # Can't track a growth history without a stable id to key on.
                      skipped_no_id += 1
                      continue

                  seen_today.add(fire_id)
                  history_path = os.path.join(HISTORY_DIR, safe_id(fire_id) + ".json")

                  if os.path.exists(history_path):
                      with open(history_path, encoding="utf-8") as f:
                          history = json.load(f)
                  else:
                      history = []

                  # One entry per fire per calendar day, but today's entry is
                  # an upsert, not write-once: it's replaced on every run
                  # until the day rolls over, then it's frozen as history.
                  # Past days never got a second look, which used to mean
                  # today's entry -- and thus the card, which always shows
                  # the latest entry -- reflected whichever run first saw
                  # this fire today, not the current run. Meanwhile
                  # fire-index.json's "acres" *does* update every run, so
                  # the two would drift apart over the course of a single
                  # day as a fire kept growing (this is what made Aspen
                  # Acres' perimeter card lag behind the dropdown/map/table).
                  # Every field is stored on each day's entry (not just
                  # acres/geometry) so each day is a fully self-contained
                  # record -- browsing an old day shows what was true that
                  # day, not today's value for fields like cause or county.
                  history = [entry for entry in history if entry.get("date") != TODAY]
                  history.append({
                      "date": TODAY,
                      "name": props.get("attr_IncidentName") or props.get("poly_IncidentName"),
                      "cause": props.get("attr_FireCause"),
                      "acres": acres_from(props),
                      "percentContained": props.get("attr_PercentContained"),
                      "personnel": props.get("attr_TotalIncidentPersonnel"),
                      "complexity": props.get("attr_IncidentComplexityLevel"),
                      "city": props.get("attr_POOCity"),
                      "landownerCategory": props.get("attr_POOLandownerCategory"),
                      "county": props.get("attr_POOCounty"),
                      "discoveryDate": props.get("attr_FireDiscoveryDateTime"),
                      "geometry": round_geometry(simplify_geometry(feature.get("geometry")))
                  })
                  dedupe_consecutive_geometry(history)
                  with open(history_path, "w", encoding="utf-8") as f:
                      json.dump(history, f, separators=(",", ":"))

                  name = props.get("attr_IncidentName") or props.get("poly_IncidentName") or "Unnamed fire"
                  acres = acres_from(props)

                  entry = index.get(fire_id, {"firstSeen": TODAY})
                  entry["name"] = name
                  entry["cause"] = props.get("attr_FireCause")
                  # The index keeps the latest value of these for fast
                  # browsing/sorting in the fire picker. The authoritative,
                  # date-accurate copy of each now lives on every day's own
                  # entry in perimeter-history/ (see above), so an old day
                  # doesn't inherit today's value if one of these changes.
                  entry["city"] = props.get("attr_POOCity")
                  entry["landownerCategory"] = props.get("attr_POOLandownerCategory")
                  entry["county"] = props.get("attr_POOCounty")
                  entry["discoveryDate"] = props.get("attr_FireDiscoveryDateTime")
                  entry["lastSeen"] = TODAY
                  entry["active"] = True
                  # Latest known acreage, not an all-time peak: a running max
                  # here (the old "peakAcres") could only ratchet upward and
                  # would silently freeze whenever a fire was briefly absent
                  # from a single hourly run of this feed, drifting out of
                  # sync with map_data.json/table_data.json (fetched from a
                  # different, always-fresh WFIGS service) and with the
                  # perimeter-history entry this same run just wrote. Simply
                  # overwriting with this run's value keeps it aligned with
                  # both of those instead.
                  if acres is not None:
                      entry["acres"] = acres
                  index[fire_id] = entry

              # Any previously-archived fire absent from today's "current" feed
              # is no longer active (contained, out, or fallen off NIFC's
              # rolling window) -- this is what makes past fires browsable.
              for fire_id, entry in index.items():
                  if fire_id not in seen_today:
                      entry["active"] = False

              with open(INDEX_PATH, "w", encoding="utf-8") as f:
                  json.dump(index, f, separators=(",", ":"), sort_keys=True)

              print(f"Archived {len(seen_today)} fire(s) for {TODAY} ({skipped_no_id} skipped, no id)")
              print(f"Fire index now has {len(index)} total fire(s)")

          if __name__ == "__main__":
              main()
          PYEOF
          python3 /tmp/archive_perimeters.py

      - name: Backfill simplify existing perimeter history (one-time)
        # Manual-only: leave "run_backfill" unchecked and this step is
        # skipped, so scheduled/push-triggered runs are never affected.
        # Existing perimeter-history/*.json files were archived before
        # coordinate rounding/simplification/deduping existed, so they
        # don't shrink on their own -- this re-processes every file
        # already on disk with the same round_geometry/simplify_geometry/
        # dedupe_consecutive_geometry helpers the daily archive step now
        # uses, so old and new files converge on the same format. Safe to
        # re-run, but not strictly idempotent on a single extra pass:
        # rounding runs *after* simplifying, so a second pass sees
        # slightly-shifted (rounded) input and can trim a couple more
        # percent -- both from re-simplifying and from previously-distinct
        # days converging to the same rounded shape and newly deduping --
        # before settling to a true fixed point after 2-3 runs. Each
        # pass' added error is bounded by the ~1m rounding grid, tiny next
        # to the 5m simplify tolerance, so this doesn't erode accuracy, it
        # just means a second run isn't guaranteed to report 0 bytes
        # changed.
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_backfill == 'true'
        run: |-
          set -euo pipefail
          cat > /tmp/backfill_perimeters.py << 'PYEOF'
          import json, os, sys

          sys.path.insert(0, "/tmp")
          from perimeter_geometry import round_geometry, simplify_geometry, dedupe_consecutive_geometry

          HISTORY_DIR = "perimeter-history"

          def count_points(coords):
              if isinstance(coords[0], (int, float)):
                  return 1
              return sum(count_points(c) for c in coords)

          def process_file(path):
              with open(path, encoding="utf-8") as f:
                  history = json.load(f)

              # dedupe_consecutive_geometry compares each day against the
              # immediately preceding one, so it needs true chronological
              # order -- the archive step always appends in order, but this
              # is cheap insurance against any older file that isn't.
              history.sort(key=lambda e: e["date"])

              before_bytes = os.path.getsize(path)
              before_pts = sum(
                  count_points(e["geometry"]["coordinates"])
                  for e in history if e.get("geometry")
              )

              for entry in history:
                  if entry.get("geometry"):
                      entry["geometry"] = round_geometry(simplify_geometry(entry["geometry"]))
              dedupe_consecutive_geometry(history)

              with open(path, "w", encoding="utf-8") as f:
                  json.dump(history, f, separators=(",", ":"))

              after_bytes = os.path.getsize(path)
              after_pts = sum(
                  count_points(e["geometry"]["coordinates"])
                  for e in history if e.get("geometry")
              )
              return before_bytes, after_bytes, before_pts, after_pts

          def main():
              if not os.path.isdir(HISTORY_DIR):
                  print("No perimeter-history directory -- nothing to backfill.")
                  return

              files = sorted(f for f in os.listdir(HISTORY_DIR) if f.endswith(".json"))
              total_before = total_after = 0

              for name in files:
                  path = os.path.join(HISTORY_DIR, name)
                  before_b, after_b, before_p, after_p = process_file(path)
                  total_before += before_b
                  total_after += after_b
                  pct = (1 - after_b / before_b) * 100 if before_b else 0.0
                  print(f"{name}: {before_b:,} -> {after_b:,} bytes ({pct:.1f}% smaller), {before_p:,} -> {after_p:,} points")

              overall_pct = (1 - total_after / total_before) * 100 if total_before else 0.0
              print()
              print(f"Backfilled {len(files)} file(s): {total_before:,} -> {total_after:,} bytes total ({overall_pct:.1f}% smaller)")

          if __name__ == "__main__":
              main()
          PYEOF
          python3 /tmp/backfill_perimeters.py

      - name: Report perimeter history file sizes
        run: |-
          set -euo pipefail

          if [ ! -d perimeter-history ] || [ -z "$(ls -A perimeter-history 2>/dev/null)" ]; then
            echo "No perimeter-history files yet."
            exit 0
          fi

          echo "Perimeter history file sizes (largest first):"
          du -b perimeter-history/*.json | sort -rn | awk '{
            kb = $1 / 1024
            printf "  %8.1f KB  %s\n", kb, $2
          }'

          # 1 MB is comfortably downloadable on any connection; flag above
          # that as worth keeping an eye on. 5 MB is where it's worth
          # actually addressing. Archived geometry is already coordinate-
          # rounded, Douglas-Peucker simplified, and deduped against
          # unchanged consecutive days (see archive_perimeters.py above)
          # before it ever reaches disk, so a file still this large despite
          # all three means a genuinely long-running, highly complex fire
          # with real day-over-day growth throughout -- the remaining lever
          # is pruning old snapshots, not squeezing further on shape.
          WATCH_BYTES=1048576
          ACT_BYTES=5242880
          watch_count=0
          act_count=0

          for f in perimeter-history/*.json; do
            size=$(stat -c%s "$f")
            if [ "$size" -ge "$ACT_BYTES" ]; then
              kb=$((size / 1024))
              echo "::warning::${f} is ${kb} KB (over 5 MB) even after simplification and deduping -- consider pruning old snapshots for this fire"
              act_count=$((act_count + 1))
            elif [ "$size" -ge "$WATCH_BYTES" ]; then
              kb=$((size / 1024))
              echo "::notice::${f} is ${kb} KB (over 1 MB) -- worth watching, no action needed yet"
              watch_count=$((watch_count + 1))
            fi
          done

          echo ""
          echo "${act_count} file(s) over 5 MB, ${watch_count} file(s) over 1 MB."

      - name: Record last-updated timestamp
        run: |-
          set -euo pipefail
          # Runs only if every fetch/archive step above succeeded (the job
          # halts on any earlier failure), so this timestamp genuinely means
          # "data was last confirmed current as of X" -- if it ever looks
          # stale on the site, that's a real signal something upstream broke.
          now=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "{\"generatedAt\":\"${now}\"}" > last-updated.json
          echo "Recorded last-updated timestamp: ${now}"

      - name: Commit and push if changed
        run: |-
          set -euo pipefail
          git config user.name "Automated"
          git config user.email "actions@users.noreply.github.com"
          git add -A

          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          timestamp=$(date -u)
          git commit -m "Latest data: ${timestamp}"

          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi

            echo "Push rejected (attempt ${attempt}), fetching remote changes..."
            git fetch origin main

            # map_data.json/table_data.json/perimeter_data.json/
            # last-updated.json are complete snapshots re-generated fresh
            # every run, so this run's copy always wins for those -- a
            # rebase conflict on them just means "keep mine," nothing to
            # merge.
            #
            # fire-index.json and perimeter-history/*.json are different:
            # they're read-modify-write accumulators built on top of
            # whatever was checked out at job start. Blindly keeping this
            # run's copy of those on conflict (the old behavior here)
            # silently erases whatever a concurrent run already appended --
            # that's exactly what happened to Aspen Acres' perimeter
            # history, which lost a day's entry this way. So for just those
            # two paths, reset to origin's latest copy and replay the
            # archive step (archive_perimeters.py, still on disk from the
            # earlier step) on top of that fresher baseline instead of this
            # run's stale one. It reads this run's perimeter_data.json --
            # already fetched, unchanged on disk, no new network call --
            # and is idempotent (see the "any date == TODAY" check), so
            # replaying it here either no-ops (today's entry is already
            # there from the other run) or adds this run's own findings on
            # top of the other run's, instead of one run's update
            # overwriting the other's.
            if ! git rebase origin/main; then
              echo "Rebase conflict -- replaying the archive step on origin's latest fire-index.json/perimeter-history/ instead of keeping this run's stale copy."
              git rebase --abort
              git checkout origin/main -- fire-index.json perimeter-history/ 2>/dev/null || true
              python3 /tmp/archive_perimeters.py
              git add -A
              if git diff --staged --quiet; then
                echo "No changes remain after merging with origin -- nothing new to commit."
                exit 0
              fi
              git commit -m "Latest data: ${timestamp}"
            fi

            sleep 2
          done

          echo "::error::Failed to push after 3 attempts"
          exit 1
